<svg xmlns="http://www.w3.org/2000/svg" width="6480" height="1440" viewBox="0 0 6480 1440" role="img" aria-labelledby="title desc">
  <title id="title">验证码二分诊断小红书六张图卡</title><desc id="desc">六张横向排列的竖版图卡，分别是标题、判断问题、普通短信分支、单平台分支、最小记录和限制条件。</desc>
  <defs><style>.t{font-family:Arial,'PingFang SC',sans-serif}.head{font-size:68px;font-weight:800;fill:#183850}.sub{font-size:31px;fill:#587082}.tag{font-size:30px;font-weight:700;fill:#a75d27}.card{fill:#fffdf9}.line{font-size:35px;font-weight:800;fill:#183850}.note{font-size:27px;fill:#587082}</style></defs>
  <g transform="translate(0)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#dbe8ef"/><text x="80" y="142" class="t tag">短信异常排查</text><text x="80" y="244" class="t head">验证码不到账</text><text x="80" y="328" class="t head">先做二分诊断</text><text x="84" y="396" class="t sub">不要一上来同时改五个设置</text><rect x="78" y="506" width="924" height="475" rx="36" class="card"/><circle cx="540" cy="698" r="130" fill="#2b6079"/><path d="M463 673h154v100H463z" fill="#fffdf9" rx="12"/><path d="M473 683l67 53 67-53" fill="none" stroke="#2b6079" stroke-width="10" stroke-linejoin="round"/><text x="196" y="910" class="t line">先判断基础短信</text><text x="80" y="1258" class="t sub">方法帮助定位问题，不承诺任何平台验证码送达</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">独立第三方教程 · 只讲合规排查</text></g>
  <g transform="translate(1080)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#f0dac4"/><text x="80" y="142" class="t tag">先问一句</text><text x="80" y="244" class="t head">普通短信</text><text x="80" y="328" class="t head">也收不到吗？</text><rect x="78" y="452" width="924" height="347" rx="34" class="card"/><text x="127" y="547" class="t line">A · 普通短信也不到</text><text x="127" y="618" class="t note">先看 SIM、设备、漫游网络</text><text x="127" y="710" class="t line">B · 只有验证码不到</text><text x="127" y="761" class="t note">再看平台和账号环境</text><text x="80" y="936" class="t sub">两个结果对应不同层级，别混在一起查</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">不要把一次结果写成永久兼容结论</text></g>
  <g transform="translate(2160)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#dbe8ef"/><text x="80" y="142" class="t tag">分支 A</text><text x="80" y="244" class="t head">普通短信</text><text x="80" y="328" class="t head">也收不到</text><rect x="78" y="452" width="924" height="412" rx="34" fill="#e8f1f4"/><text x="127" y="548" class="t line">先检查</text><text x="127" y="625" class="t" font-size="31" fill="#416b7d">• SIM / eSIM 线路是否启用</text><text x="127" y="690" class="t" font-size="31" fill="#416b7d">• 手机是否无锁、能否注册网络</text><text x="127" y="755" class="t" font-size="31" fill="#416b7d">• 漫游与手动选网是否需排查</text><text x="80" y="954" class="t sub">先验证基础通道，再谈目标平台</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">设置与按钮以当天官方页和设备界面为准</text></g>
  <g transform="translate(3240)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#f0dac4"/><text x="80" y="142" class="t tag">分支 B</text><text x="80" y="244" class="t head">普通短信能到</text><text x="80" y="328" class="t head">只有验证码不到</text><rect x="78" y="452" width="924" height="414" rx="34" fill="#f5e9dd"/><text x="127" y="548" class="t" font-size="35" font-weight="800" fill="#85502d">再检查</text><text x="127" y="625" class="t" font-size="31" fill="#8e6e59">• 平台是否接受这个号码</text><text x="127" y="690" class="t" font-size="31" fill="#8e6e59">• 账号资料和设备环境</text><text x="127" y="755" class="t" font-size="31" fill="#8e6e59">• 是否短时间请求过多</text><text x="80" y="954" class="t sub">基础短信正常，不等于下一条 OTP 一定到</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">不提供绕过风控、批量接码或代理方法</text></g>
  <g transform="translate(4320)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#dbe8ef"/><text x="80" y="142" class="t tag">最小记录</text><text x="80" y="244" class="t head">每次只改</text><text x="80" y="328" class="t head">一个变量</text><rect x="78" y="452" width="924" height="418" rx="34" class="card"/><text x="126" y="545" class="t line">只记录必要信息</text><text x="126" y="622" class="t note">日期和大致时间</text><text x="126" y="678" class="t note">城市、设备和系统版本</text><text x="126" y="734" class="t note">普通短信是否正常</text><text x="126" y="790" class="t note">可见错误与每步结果</text><text x="80" y="956" class="t sub">这样才能判断问题在哪一层</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">不要记录密码、验证码、Cookie 或完整卡信息</text></g>
  <g transform="translate(5400)"><rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="124" r="225" fill="#f0dac4"/><text x="80" y="142" class="t tag">最后的边界</text><text x="80" y="244" class="t head">以前能收到</text><text x="80" y="328" class="t head">也不等于永久兼容</text><rect x="78" y="452" width="924" height="335" rx="34" class="card"/><text x="126" y="548" class="t line">时间、城市、设备、</text><text x="126" y="612" class="t line">网络与平台规则</text><text x="126" y="676" class="t line">都会变化</text><rect x="78" y="850" width="924" height="191" rx="30" fill="#f5e9dd"/><text x="126" y="930" class="t" font-size="33" font-weight="800" fill="#85502d">不承诺任何平台必到</text><text x="126" y="980" class="t" font-size="27" fill="#8e6e59">完整诊断树可搜索 getgiffgaff 收不到验证码</text><text x="80" y="1382" class="t" font-size="23" fill="#637985">方法是诊断工具，不是平台政策或成功保证</text></g>
</svg>
