<svg xmlns="http://www.w3.org/2000/svg" width="6480" height="1440" viewBox="0 0 6480 1440" role="img" aria-labelledby="title desc">
  <title id="title">保号第5个月检查法小红书六张图卡</title><desc id="desc">六张横向排列的竖版图卡，分别是标题、规则边界、确认日期、账号检查、费用检查和提醒边界。</desc>
  <defs><style>.t{font-family:Arial,'PingFang SC',sans-serif}.head{font-size:68px;font-weight:800;fill:#183f37}.sub{font-size:31px;fill:#587269}.tag{font-size:30px;font-weight:700;fill:#a65c22}.card{fill:#fffdf9}.num{font-size:36px;font-weight:800;fill:#fff}.line{font-size:35px;font-weight:800;fill:#183f37}.note{font-size:27px;fill:#587269}</style></defs>
  <g transform="translate(0)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="946" cy="122" r="224" fill="#d8e6dc"/><text x="80" y="142" class="t tag">英国备用号码</text><text x="80" y="244" class="t head">保号第 5 个月</text><text x="80" y="328" class="t head">检查法</text><text x="84" y="396" class="t sub">别等到最后几天才开始处理</text><rect x="78" y="500" width="924" height="498" rx="36" class="card"/><text x="132" y="596" class="t line">先把保号变成</text><text x="132" y="660" class="t line">一个可核对的日历任务</text><circle cx="540" cy="810" r="145" fill="#2e604f"/><text x="468" y="829" class="t" font-size="74" font-weight="800" fill="#fff">5 月</text><text x="80" y="1258" class="t sub">不是官方新期限，只是预留排查缓冲</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">独立第三方教程 · 发布前核对官方规则</text></g>
  <g transform="translate(1080)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="950" cy="124" r="224" fill="#f0dfc7"/><text x="80" y="142" class="t tag">先确认规则</text><text x="80" y="244" class="t head">“6 个月”</text><text x="80" y="328" class="t head">从哪一天开始算？</text><rect x="78" y="452" width="924" height="342" rx="34" class="card"/><text x="126" y="535" class="t line">先找官方列明的</text><text x="126" y="595" class="t line">有效动作日期</text><text x="126" y="670" class="t note">不要只看“最近收到过短信”</text><rect x="78" y="848" width="924" height="208" rx="30" fill="#f4e9db"/><text x="126" y="930" class="t" font-size="33" font-weight="800" fill="#82512c">仅收短信不单独依赖</text><text x="126" y="981" class="t" font-size="27" fill="#8f6c55">规则和有效动作以当天官方页面为准</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">不写永久保号，也不承诺结果</text></g>
  <g transform="translate(2160)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="944" cy="120" r="220" fill="#d8e6dc"/><text x="80" y="142" class="t tag">第 1 步</text><text x="80" y="244" class="t head">确认上次</text><text x="80" y="328" class="t head">有效动作</text><rect x="78" y="452" width="924" height="392" rx="34" class="card"/><circle cx="150" cy="554" r="34" fill="#2e604f"/><text x="138" y="567" class="t num">1</text><text x="216" y="563" class="t line">找得到日期</text><circle cx="150" cy="662" r="34" fill="#2e604f"/><text x="138" y="675" class="t num">2</text><text x="216" y="671" class="t line">说得清动作类型</text><circle cx="150" cy="770" r="34" fill="#2e604f"/><text x="138" y="783" class="t num">3</text><text x="216" y="779" class="t line">保留必要记录</text><text x="80" y="950" class="t sub">无法确认时，不要凭印象补日期</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">不展示号码、账号、余额或验证码</text></g>
  <g transform="translate(3240)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="950" cy="125" r="225" fill="#dce8ee"/><text x="80" y="142" class="t tag">第 2 步</text><text x="80" y="244" class="t head">检查账号</text><text x="80" y="328" class="t head">和邮箱</text><rect x="78" y="453" width="924" height="398" rx="34" class="card"/><text x="128" y="550" class="t line">能否正常登录？</text><text x="128" y="633" class="t line">恢复方式还可用吗？</text><text x="128" y="716" class="t line">换卡或 eSIM 时</text><text x="128" y="776" class="t line">能找回账号吗？</text><text x="80" y="952" class="t sub">卡还在，不等于后续操作一定顺利</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">不要在图文中提供账户或密码信息</text></g>
  <g transform="translate(4320)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="950" cy="126" r="225" fill="#f0dfc7"/><text x="80" y="142" class="t tag">第 3 步</text><text x="80" y="244" class="t head">先重看规则</text><text x="80" y="328" class="t head">和当前资费</text><rect x="78" y="453" width="924" height="382" rx="34" class="card"/><text x="126" y="550" class="t line">要做什么动作？</text><text x="126" y="635" class="t line">当前漫游费用怎样？</text><text x="126" y="720" class="t line">是否需要先排查</text><text x="126" y="780" class="t line">信号或余额问题？</text><text x="80" y="940" class="t sub">未知资费时，不要为测试随意操作</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">页面与费用会变，以操作当天官方资料为准</text></g>
  <g transform="translate(5400)"><rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="948" cy="124" r="225" fill="#d8e6dc"/><text x="80" y="142" class="t tag">第 4 步</text><text x="80" y="244" class="t head">完成后记录</text><text x="80" y="328" class="t head">并重新设提醒</text><rect x="78" y="453" width="924" height="343" rx="34" class="card"/><text x="126" y="550" class="t line">记录操作日期</text><text x="126" y="635" class="t line">记录动作类型</text><text x="126" y="720" class="t line">记录可见结果</text><rect x="78" y="853" width="924" height="198" rx="30" fill="#f4e9db"/><text x="124" y="933" class="t" font-size="33" font-weight="800" fill="#82512c">提醒只是待办</text><text x="124" y="981" class="t" font-size="27" fill="#8f6c55">不是号码保留结果，也不会读取账号状态</text><text x="80" y="1382" class="t" font-size="23" fill="#637b70">完整方法可查看 getgiffgaff 保号提醒工具</text></g>
</svg>
