<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">验证码不到账先问一句</title><desc id="desc">竖版中文图卡，用两条分支呈现普通短信与平台验证码异常的诊断区别。</desc>
  <rect width="1080" height="1440" fill="#f5f5f0"/><circle cx="950" cy="125" r="230" fill="#dbe8ef"/><circle cx="74" cy="1330" r="245" fill="#f0dac4" opacity=".65"/>
  <text x="80" y="140" fill="#a75d27" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" letter-spacing="3">短信异常排查</text>
  <text x="80" y="242" fill="#183850" font-family="Arial, 'PingFang SC', sans-serif" font-size="68" font-weight="800">验证码不到账</text><text x="80" y="325" fill="#183850" font-family="Arial, 'PingFang SC', sans-serif" font-size="68" font-weight="800">先问一句</text>
  <text x="84" y="394" fill="#587082" font-family="Arial, 'PingFang SC', sans-serif" font-size="31">普通短信也收不到，还是只有验证码不到？</text>
  <rect x="78" y="478" width="924" height="164" rx="30" fill="#fffdf9"/><text x="119" y="542" fill="#1e465e" font-family="Arial, 'PingFang SC', sans-serif" font-size="38" font-weight="800">A · 普通短信也不到</text><text x="120" y="593" fill="#587082" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">优先查 SIM、设备、漫游注册与手动选网</text>
  <path d="M540 650v68M540 718L250 806M540 718l290 88" fill="none" stroke="#7997a8" stroke-width="8" stroke-linecap="round"/>
  <rect x="78" y="807" width="442" height="257" rx="30" fill="#e8f1f4"/><text x="120" y="873" fill="#204a61" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="800">先做这些</text><text x="120" y="932" fill="#416b7d" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 看 SIM / eSIM 线路</text><text x="120" y="983" fill="#416b7d" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 看网络与漫游状态</text><text x="120" y="1034" fill="#416b7d" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 一次只改一项</text>
  <rect x="560" y="807" width="442" height="257" rx="30" fill="#f5e9dd"/><text x="600" y="873" fill="#85502d" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="800">B · 只有验证码不到</text><text x="600" y="932" fill="#8e6e59" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 看平台是否接受号码</text><text x="600" y="983" fill="#8e6e59" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 看账号与请求频率</text><text x="600" y="1034" fill="#8e6e59" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">• 记录时间和错误</text>
  <rect x="78" y="1127" width="924" height="166" rx="30" fill="#fffdf9"/><text x="119" y="1194" fill="#183850" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="800">不要同时改五个设置</text><text x="120" y="1247" fill="#587082" font-family="Arial, 'PingFang SC', sans-serif" font-size="28">不要提交密码、验证码或完整卡信息</text>
  <text x="80" y="1382" fill="#637985" font-family="Arial, 'PingFang SC', sans-serif" font-size="23">方法帮助定位问题，不承诺任何平台验证码送达</text>
</svg>
