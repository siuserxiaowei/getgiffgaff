<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440" role="img" aria-labelledby="title desc">
  <title id="title">保号第5个月检查法</title><desc id="desc">竖版中文图卡，列出保号前的四项检查及其限制条件。</desc>
  <rect width="1080" height="1440" fill="#f5f4ee"/><circle cx="952" cy="128" r="220" fill="#d8e6dc"/><circle cx="80" cy="1350" r="260" fill="#f1dfc7" opacity=".7"/>
  <text x="82" y="142" fill="#a65c22" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" letter-spacing="3">英国备用号码</text>
  <text x="80" y="244" fill="#183f37" font-family="Arial, 'PingFang SC', sans-serif" font-size="72" font-weight="800">保号第 5 个月</text><text x="80" y="332" fill="#183f37" font-family="Arial, 'PingFang SC', sans-serif" font-size="72" font-weight="800">检查法</text>
  <text x="84" y="399" fill="#587269" font-family="Arial, 'PingFang SC', sans-serif" font-size="31">别等到最后几天才开始处理</text>
  <g font-family="Arial, 'PingFang SC', sans-serif"><g><rect x="78" y="478" width="924" height="142" rx="28" fill="#fffdf9"/><circle cx="143" cy="549" r="32" fill="#2e604f"/><text x="132" y="560" fill="#fff" font-size="31" font-weight="800">1</text><text x="206" y="545" fill="#183f37" font-size="36" font-weight="800">确认上次有效动作</text><text x="208" y="588" fill="#587269" font-size="26">不要凭印象补一个日期</text></g>
  <g><rect x="78" y="649" width="924" height="142" rx="28" fill="#fffdf9"/><circle cx="143" cy="720" r="32" fill="#2e604f"/><text x="132" y="731" fill="#fff" font-size="31" font-weight="800">2</text><text x="206" y="716" fill="#183f37" font-size="36" font-weight="800">检查账号和邮箱</text><text x="208" y="759" fill="#587269" font-size="26">恢复方式也要可用</text></g>
  <g><rect x="78" y="820" width="924" height="142" rx="28" fill="#fffdf9"/><circle cx="143" cy="891" r="32" fill="#2e604f"/><text x="132" y="902" fill="#fff" font-size="31" font-weight="800">3</text><text x="206" y="887" fill="#183f37" font-size="36" font-weight="800">重看规则和当前资费</text><text x="208" y="930" fill="#587269" font-size="26">操作前先核对官方页面</text></g>
  <g><rect x="78" y="991" width="924" height="142" rx="28" fill="#fffdf9"/><circle cx="143" cy="1062" r="32" fill="#2e604f"/><text x="132" y="1073" fill="#fff" font-size="31" font-weight="800">4</text><text x="206" y="1058" fill="#183f37" font-size="36" font-weight="800">完成后记录并设提醒</text><text x="208" y="1101" fill="#587269" font-size="26">下次不用再靠记忆</text></g></g>
  <rect x="78" y="1182" width="924" height="142" rx="28" fill="#f4e9db"/><text x="119" y="1241" fill="#82512c" font-family="Arial, 'PingFang SC', sans-serif" font-size="31" font-weight="800">注意：仅收短信不要单独依赖</text><text x="119" y="1285" fill="#8f6c55" font-family="Arial, 'PingFang SC', sans-serif" font-size="25">提醒只是待办，不等于号码保留结果</text>
  <text x="80" y="1386" fill="#637b70" font-family="Arial, 'PingFang SC', sans-serif" font-size="23">独立第三方教程 · 发布前重新核对运营商官方规则</text>
</svg>
