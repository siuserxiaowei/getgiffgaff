<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">保号别等满六个月</title>
  <desc id="desc">暖白色封面，以第五个月的日历、提醒标记和手机卡为主体，说明提前检查而不是承诺保号。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8f5ef"/><stop offset="1" stop-color="#e4eee7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#23423b" flood-opacity=".15"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1337" cy="119" r="318" fill="#d8e5dc"/><circle cx="1454" cy="724" r="256" fill="#f0ddc1" opacity=".68"/>
  <text x="118" y="165" fill="#a65c22" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" letter-spacing="3">低频使用英国号码</text>
  <text x="118" y="300" fill="#183f37" font-family="Arial, 'PingFang SC', sans-serif" font-size="94" font-weight="800">保号别等满</text>
  <text x="118" y="413" fill="#183f37" font-family="Arial, 'PingFang SC', sans-serif" font-size="94" font-weight="800">6 个月</text>
  <text x="122" y="485" fill="#4f6d63" font-family="Arial, 'PingFang SC', sans-serif" font-size="35">第 5 个月先检查，再安排下一步</text>
  <line x1="122" y1="535" x2="644" y2="535" stroke="#a65c22" stroke-width="7" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="840" y="148" width="506" height="573" rx="38" fill="#fffdf9"/>
    <rect x="840" y="148" width="506" height="113" rx="38" fill="#224f44"/>
    <rect x="840" y="219" width="506" height="42" fill="#224f44"/>
    <g fill="#f8f5ef"><rect x="918" y="122" width="30" height="80" rx="15"/><rect x="1237" y="122" width="30" height="80" rx="15"/></g>
    <text x="932" y="242" fill="#f7f4ec" font-family="Arial, 'PingFang SC', sans-serif" font-size="32" font-weight="700">第 5 个月检查</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#50695f"><text x="896" y="335">确认上次有效动作</text><text x="896" y="414">检查账号与邮箱</text><text x="896" y="493">重看规则与资费</text><text x="896" y="572">完成后重新设提醒</text></g>
    <g fill="#dce8df" stroke="#6d877b" stroke-width="3"><circle cx="1277" cy="325" r="20"/><circle cx="1277" cy="404" r="20"/><circle cx="1277" cy="483" r="20"/></g>
    <circle cx="1277" cy="562" r="29" fill="#a65c22"/><path d="M1263 562l10 10 20-25" fill="none" stroke="#fffdf9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1059" y="618" width="180" height="83" rx="16" fill="#305f51" transform="rotate(7 1059 618)"/><rect x="1087" y="646" width="112" height="16" rx="8" fill="#dce8df" transform="rotate(7 1087 646)"/>
  </g>
  <text x="121" y="779" fill="#5d7180" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">提醒不等于号码保留结果 · 操作前核对运营商当天规则</text>
</svg>
